services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tokenizer
      POSTGRES_USER: tokenizer
      POSTGRES_PASSWORD: tokenizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://tokenizer:tokenizer@db:5432/tokenizer
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
